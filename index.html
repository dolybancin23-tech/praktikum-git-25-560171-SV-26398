<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Reservasi Klinik Gigi</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f8ff; color: #333; }
        main { padding: 20px; max-width: 600px; margin: auto; background: white; border-radius: 8px; }
        form { margin-top: 20px; }
        button { background-color: #007bff; color: white; padding: 10px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <main>
        <h1>Klinik Gigi Senyum Cemerlang</h1>
        <p>Melayani perawatan gigi profesional untuk Anda.</p>
        
        <form>
            <label>Nama Pasien:</label><br>
            <input type="text" placeholder="Masukkan nama"><br>
            <label>Pilih Layanan:</label><br>
            <select>
                <option>Cabut Gigi</option>
                <option>Pembersihan Karang (Scaling)</option>
                <option>Pemasangan Kawat Gigi</option>
            </select><br>
            <button type="submit">Buat Reservasi</button>
        </form>
    </main>
</body>
</html>
